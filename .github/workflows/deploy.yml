name: Deploy Resume

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install fonts
        run: |
          sudo apt-get install -y fonts-ibm-plex
          wget -q "https://fonts.google.com/download?family=JetBrains+Mono" -O /tmp/jbm.zip
          sudo unzip -q /tmp/jbm.zip -d /usr/share/fonts/jetbrains-mono/
          sudo fc-cache -f
      - uses: typst-community/setup-typst@v5
      - uses: extractions/setup-just@v4
      - run: just build
      - run: |
          mkdir _site
          cp resume.pdf _site/
          cp index.html _site/
          ls -la _site/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
